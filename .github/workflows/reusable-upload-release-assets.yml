---
name: Reusable Upload Release Assets

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag name (e.g. 1.0.0 or v1.0.0). Must match existing GitHub Release."
        type: string
        required: true

      artifact_pattern:
        description: "Pattern to match artifacts for download (e.g. jacred-*-*)"
        type: string
        required: false
        default: "jacred-*-*"

jobs:
  upload-release-assets:
    name: Attach artifacts to release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: ${{ inputs.artifact_pattern }}
          path: artifacts
          merge-multiple: false

      - name: Create release archives
        id: archives
        run: |
          set -e
          RELEASE_DIR=release-files
          mkdir -p "$RELEASE_DIR"

          for artifact_dir in artifacts/*/; do
            name=$(basename "$artifact_dir")
            (cd "$artifact_dir" && zip -r "../../$RELEASE_DIR/${name}.zip" .)
          done

          {
            echo 'files<<EOF'
            ls -1 "$RELEASE_DIR"/*.zip
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ steps.archives.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
