name: Build

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: "Tag name for release builds"
        required: false
        type: string
      checkout_ref:
        description: "Git ref to checkout (e.g., refs/tags/1.0.0)"
        required: false
        type: string

permissions:
  contents: write
  actions: read
  packages: read
  id-token: write

jobs:
  extract-version:
    name: Extract version
    permissions:
      actions: read
    uses: ./.github/workflows/reusable-extract-version.yml
    with:
      tag: ${{ inputs.tag }}
      checkout_ref: ${{ inputs.checkout_ref }}
    secrets: inherit

  build:
    name: .NET build
    needs: extract-version
    uses: ./.github/workflows/reusable-build.yml
    with:
      checkout_ref: ${{ needs.extract-version.outputs.checkout_ref }}
      dotnet_version: ${{ vars.DOTNET_VERSION || '9.0.x' }}
      retention_days: ${{ needs.extract-version.outputs.is_release == 'true' && 30 || 7 }}
    secrets: inherit

  build-docker-image:
    name: Build and push Docker image
    needs: extract-version
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      image: ${{ vars.IMAGE_NAME || 'jacred' }}
      version: ${{ needs.extract-version.outputs.version }}
      tag_latest: ${{ needs.extract-version.outputs.tag_latest }}
      checkout_ref: ${{ needs.extract-version.outputs.checkout_ref }}
      push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.tag != '' }}
      attest_github: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.tag != '' }}
      sbom: true
      provenance: "mode=max"
      generate_syft_sbom: true
      sbom_artifact_retention_days: ${{ (inputs.tag != '' || startsWith(github.ref, 'refs/tags/')) && 30 || 7 }}
    secrets: inherit

  upload-release-assets:
    name: Attach artifacts to release
    permissions:
      contents: write
    needs:
      - extract-version
      - build
    if: needs.extract-version.outputs.is_release == 'true'
    uses: ./.github/workflows/reusable-upload-release-assets.yml
    with:
      tag: ${{ needs.extract-version.outputs.release_tag }}
      artifact_pattern: "jacred-*-*"
    secrets: inherit
