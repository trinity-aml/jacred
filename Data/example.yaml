proxy:
  pattern: ""
  useAuth: false
  BypassOnLocal: false
  username: ""
  password: ""
  list:
    - ip:port
    - socks5://ip:port

globalproxy:
  - pattern: "\\.onion"
    useAuth: false
    BypassOnLocal: false
    username: ""
    password: ""
    list:
      - socks5://127.0.0.1:9050
